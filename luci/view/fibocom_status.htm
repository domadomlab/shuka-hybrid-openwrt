<%+header%>
<style>
    .fibocom-card {
        background: #1e293b; color: #f1f5f9; padding: 20px; border-radius: 12px;
        margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #334155;
    }
    .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 10px; }
    .status-item {
        background: #0f172a; padding: 15px; border-radius: 8px; text-align: center;
        border: 1px solid #1e293b; display: flex; flex-direction: column; align-items: center;
    }
    .status-value { font-size: 24px; font-weight: bold; color: #38bdf8; margin: 5px 0; }
    .status-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
    .ca-badge {
        background: #064e3b; color: #34d399; padding: 4px 12px; border-radius: 20px;
        font-size: 12px; font-weight: bold; margin-top: 5px; border: 1px solid #059669;
    }
    .ca-badge.inactive { background: #451a03; color: #fbbf24; border-color: #d97706; }
    .scell-list { font-size: 14px; color: #38bdf8; margin-top: 5px; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
    .info-item { background: #0f172a; padding: 10px; border-radius: 6px; border-left: 3px solid #38bdf8; }
    .info-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; }
    .info-value { font-size: 13px; font-weight: bold; color: #f1f5f9; }
    .terminal-window {
        background: #000; color: #10b981; font-family: 'Fira Code', monospace;
        padding: 10px; height: 180px; overflow-y: auto; border-radius: 6px;
        border: 1px solid #334155; white-space: pre-wrap; font-size: 12px;
    }
    .btn-action {
        background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px;
        border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
    }
    .btn-action:hover { background: #7dd3fc; transform: translateY(-1px); }
    .btn-secondary { background: #334155; color: #f1f5f9; margin-left: 10px; }
    .band-selector { display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0; }
    .band-opt { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 12px; background: #0f172a; border-radius: 6px; border: 1px solid #334155; }
    .band-opt input { cursor: pointer; }
</style>

<div class="fibocom-card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0"><span style="color:#38bdf8">Fibocom L860-GL</span> Advanced Control</h2>
        <div id="ca-status-badge" class="ca-badge inactive">CA INACTIVE</div>
    </div>
    
    <div class="status-grid">
        <div class="status-item">
            <div id="csq-value" class="status-value">--</div>
            <div class="status-label">Signal Quality (CSQ)</div>
        </div>
        <div class="status-item">
            <div id="primary-band" class="status-value">--</div>
            <div class="status-label">Primary Band (PCC)</div>
            <div id="scell-container" class="scell-list"></div>
        </div>
        <div class="status-item">
            <div id="modem-temp" class="status-value">--</div>
            <div class="status-label">Temperature</div>
        </div>
    </div>

    <div class="info-grid">
        <div class="info-item"><div class="info-label">Operator</div><div id="info-operator" class="info-value">--</div></div>
        <div class="info-item"><div class="info-label">Status</div><div id="info-status" class="info-value">Connected</div></div>
        <div class="info-item"><div class="info-label">MIMO</div><div id="info-mimo" class="info-value">Auto</div></div>
    </div>
</div>

<div class="fibocom-card">
    <h3>LTE Band Management</h3>
    <div class="band-selector">
        <label class="band-opt"><input type="checkbox" name="band" value="101"> B1</label>
        <label class="band-opt"><input type="checkbox" name="band" value="103"> B3</label>
        <label class="band-opt"><input type="checkbox" name="band" value="107"> B7</label>
        <label class="band-opt"><input type="checkbox" name="band" value="108"> B8</label>
        <label class="band-opt"><input type="checkbox" name="band" value="120"> B20</label>
    </div>
    <button class="btn-action" onclick="applyBands()">Apply Bands</button>
    <button class="btn-action btn-secondary" onclick="restoreCA()">Restore CA Engine</button>
</div>

<div class="fibocom-card">
    <h3>AT Command Terminal</h3>
    <div id="terminal" class="terminal-window">Initializing L860 terminal...</div>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <input type="text" id="at-input" style="flex:1; background:#000; color:#fff; border:1px solid #334155; padding:10px; border-radius:6px;" placeholder="Enter AT Command..." onkeydown="if(event.keyCode==13) sendAT()">
        <button class="btn-action" onclick="sendAT()">Execute</button>
    </div>
</div>

<script type="text/javascript">
    function updateStatus() {
        XHR.get('<%=luci.dispatcher.build_url("admin", "network", "fibocom", "data")%>', null, function(x, data) {
            if (data && !data.error) {
                document.getElementById('csq-value').innerHTML = data.csq || "0,0";
                document.getElementById('primary-band').innerHTML = data.primary_band || "N/A";
                document.getElementById('modem-temp').innerHTML = data.temperature || "--";
                document.getElementById('info-operator').innerHTML = data.operator || "Unknown";
                
                let badge = document.getElementById('ca-status-badge');
                let scellCont = document.getElementById('scell-container');
                
                if (data.ca_active) {
                    badge.innerHTML = "CA ACTIVE (" + data.scells.length + " SCC)";
                    badge.className = "ca-badge";
                    scellCont.innerHTML = "+" + data.scells.join(', ');
                } else {
                    badge.innerHTML = "CA INACTIVE";
                    badge.className = "ca-badge inactive";
                    scellCont.innerHTML = "";
                }
            }
        });
    }

    function applyBands() {
        let selected = [];
        document.querySelectorAll('input[name="band"]:checked').forEach(cb => selected.push(cb.value));
        if (selected.length === 0) { alert("Select at least one band!"); return; }
        
        let btn = event.target; btn.disabled = true; btn.innerHTML = "Applying...";
        XHR.get('<%=luci.dispatcher.build_url("admin", "network", "fibocom", "set_band")%>', { bands: selected.join(',') }, function(x, res) {
            btn.disabled = false; btn.innerHTML = "Apply Bands";
            alert("Response: " + x.responseText);
            updateStatus();
        });
    }

    function restoreCA() {
        if (!confirm("Restore Carrier Aggregation engine? This will send at@sic:ca_restore(0)")) return;
        XHR.get('<%=luci.dispatcher.build_url("admin", "network", "fibocom", "restore_ca")%>', null, function(x, res) {
            alert("Restore: " + x.responseText);
            updateStatus();
        });
    }

    function sendAT() {
        let input = document.getElementById('at-input');
        let term = document.getElementById('terminal');
        let cmd = input.value; if (!cmd) return;
        
        term.innerHTML += "\n[SEND] " + cmd;
        XHR.get('<%=luci.dispatcher.build_url("admin", "network", "fibocom", "at_cmd")%>', { cmd: cmd }, function(x, res) {
            term.innerHTML += "\n[RECV] " + x.responseText;
            term.scrollTop = term.scrollHeight;
            input.value = "";
        });
    }

    setInterval(updateStatus, 3000);
    updateStatus();
</script>

<%+footer%>
